<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { width: 300px; margin: 0; font: 14px/1.4 system-ui, sans-serif; background: #0f1424; color: #e2e8f0; }
      header { padding: 12px 14px; border-bottom: 1px solid rgba(255,255,255,.1); font-weight: 700; color: #fff; }
      .search { display: flex; gap: 6px; padding: 12px 14px; }
      input { flex: 1; background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.12); border-radius: 10px; padding: 8px 10px; color: #fff; }
      button { background: #2563eb; color: #fff; border: 0; border-radius: 10px; padding: 8px 12px; font-weight: 600; cursor: pointer; }
      #result { padding: 0 14px 12px; }
      .word { font-size: 18px; font-weight: 700; color: #fff; }
      .pos { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: #c4b5fd; background: rgba(139,92,246,.15); border-radius: 999px; padding: 2px 8px; display: inline-block; margin-top: 6px; }
      .def { margin-top: 4px; color: #cbd5e1; }
      .saved { padding: 10px 14px; border-top: 1px solid rgba(255,255,255,.08); }
      .saved h4 { margin: 0 0 6px; font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: #64748b; }
      .chip { display: inline-block; background: rgba(34,197,94,.15); color: #86efac; border-radius: 999px; padding: 2px 8px; margin: 0 4px 4px 0; font-size: 12px; }
    </style>
  </head>
  <body>
    <header>SpeakAI · Quick Lookup</header>
    <div class="search">
      <input id="q" placeholder="Look up a word…" autofocus />
      <button id="go">Go</button>
    </div>
    <div id="result"></div>
    <div class="saved"><h4>Recently saved</h4><div id="saved"></div></div>
    <script src="popup.js"></script>
  </body>
</html>
